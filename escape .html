<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端适配核心：禁止缩放，按设备宽度渲染 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>逃脱猎豹（摇杆版）</title>
    <style>
        /* 游戏场景样式：自适应屏幕 */
        #game-container {
            width: 90vw;
            max-width: 400px;
            height: 90vw;
            max-height: 400px;
            margin: 20px auto;
            border: 3px solid #333;
            position: relative;
            background-color: #f5f5f5;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        /* 玩家和猎豹样式 */
        #player {
            width: 10%;
            height: 10%;
            background-color: #4285f4;
            position: absolute;
            top: 45%;
            left: 45%;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        #cheetah {
            width: 10%;
            height: 10%;
            background-color: #2233f4;
            position: absolute;
            top: 5%;
            left: 5%;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        /* 提示文本 */
        #info {
            margin: 15px auto;
            text-align: center;
            font-family: "Arial", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 16px;
            color: #333;
            max-width: 90vw;
        }
        /* 虚拟摇杆样式（核心新增） */
        #joystick-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            z-index: 100; /* 确保在最上层，不被遮挡 */
        }
        #joystick-base {
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.2);
            border-radius: 50%;
            position: relative;
            touch-action: none; /* 阻止浏览器默认触摸行为 */
        }
        #joystick-knob {
            width: 45%;
            height: 45%;
            background-color: rgba(66, 133, 244, 0.8);
            border-radius: 50%;
            position: absolute;
            top: 27.5%;
            left: 27.5%;
            touch-action: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        /* 电脑端方向键提示（隐藏手机端） */
        #keyboard-hint {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 5px;
            display: none; /* 手机端默认隐藏 */
        }
        /* 媒体查询：电脑端显示方向键提示，隐藏摇杆 */
        @media (min-width: 768px) {
            #joystick-container {
                display: none;
            }
            #keyboard-hint {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="player"></div>
        <div id="cheetah"></div>
    </div>
    <div id="info">逃脱猎豹的追捕！猎豹会逐渐加速～</div>
    <div id="keyboard-hint">电脑端按方向键控制移动</div>

    <!-- 虚拟摇杆（手机端显示） -->
    <div id="joystick-container">
        <div id="joystick-base">
            <div id="joystick-knob"></div>
        </div>
    </div>

    <script>
        // 获取元素
        const player = document.getElementById('player');
        const container = document.getElementById('game-container');
        const cheetah = document.getElementById('cheetah');
        const joystickBase = document.getElementById('joystick-base');
        const joystickKnob = document.getElementById('joystick-knob');

        // 动态计算角色尺寸
        const getRoleSize = () => container.clientWidth * 0.1;
        const roleSize = getRoleSize();

        // 游戏核心参数（含猎豹加速配置）
        let x = container.clientWidth * 0.45; // 玩家X坐标
        let y = container.clientHeight * 0.45; // 玩家Y坐标
        let x0 = container.clientWidth * 0.05; // 猎豹X坐标
        let y0 = container.clientHeight * 0.05; // 猎豹Y坐标
        const playerStep = roleSize * 0.3; // 玩家移动步长（适配摇杆灵敏度）
        let cheetahStep = roleSize * 0.2; // 猎豹初始步长
        let chaseInterval = 250; // 猎豹初始追击间隔（毫秒）
        const minInterval = 80; // 猎豹最小追击间隔（限制最快速度）
        const speedUpTime = 5000; // 每5秒加速一次
        const intervalDecrease = 20; // 每次加速减少的间隔
        let chaseTimer = null; // 猎豹追击定时器
        let isJoystickActive = false; // 摇杆是否激活

        // ---------------------- 1. 虚拟摇杆控制逻辑（核心新增） ----------------------
        const joystickRadius = joystickBase.clientWidth / 2; // 摇杆底座半径
        const knobRadius = joystickKnob.clientWidth / 2; // 摇杆旋钮半径
        const maxKnobOffset = joystickRadius - knobRadius; // 旋钮最大偏移量（避免超出底座）

        // 摇杆触摸开始：激活摇杆
        joystickBase.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isJoystickActive = true;
            updateJoystick(e.touches[0]);
        }, { passive: false });

        // 摇杆触摸移动：计算方向并移动玩家
        document.addEventListener('touchmove', (e) => {
            if (!isJoystickActive) return;
            e.preventDefault();
            updateJoystick(e.touches[0]);
        }, { passive: false });

        // 摇杆触摸结束：重置旋钮位置，关闭激活状态
        document.addEventListener('touchend', () => {
            if (isJoystickActive) {
                isJoystickActive = false;
                // 重置旋钮到中心
                joystickKnob.style.transform = 'translate(0, 0)';
            }
        }, { passive: false });

        // 计算摇杆方向并移动玩家
        function updateJoystick(touch) {
            // 获取摇杆底座的坐标（相对于页面）
            const baseRect = joystickBase.getBoundingClientRect();
            const baseCenterX = baseRect.left + joystickRadius;
            const baseCenterY = baseRect.top + joystickRadius;

            // 计算触摸点相对于底座中心的偏移量
            const touchX = touch.clientX;
            const touchY = touch.clientY;
            const offsetX = touchX - baseCenterX;
            const offsetY = touchY - baseCenterY;

            // 计算偏移角度（弧度），确定移动方向
            const angle = Math.atan2(offsetY, offsetX);

            // 限制旋钮最大偏移量（避免超出底座）
            const distance = Math.min(Math.hypot(offsetX, offsetY), maxKnobOffset);

            // 更新旋钮位置
            const knobX = distance * Math.cos(angle);
            const knobY = distance * Math.sin(angle);
            joystickKnob.style.transform = `translate(${knobX}px, ${knobY}px)`;

            // 根据角度计算玩家移动方向，更新玩家坐标
            if (distance > 10) { // 偏移量大于10px才移动（防误触）
                x += playerStep * Math.cos(angle);
                y += playerStep * Math.sin(angle);

                // 边界限制（避免玩家超出容器）
                x = Math.max(0, Math.min(container.clientWidth - roleSize, x));
                y = Math.max(0, Math.min(container.clientHeight - roleSize, y));

                // 更新玩家位置
                updatePlayerPosition();
            }
        }

        // ---------------------- 2. 电脑端方向键控制（兼容保留） ----------------------
        document.addEventListener('keydown', (e) => {
            e.preventDefault();
            switch (e.key) {
                case 'ArrowUp': y = Math.max(0, y - playerStep); break;
                case 'ArrowDown': y = Math.min(container.clientHeight - roleSize, y + playerStep); break;
                case 'ArrowLeft': x = Math.max(0, x - playerStep); break;
                case 'ArrowRight': x = Math.min(container.clientWidth - roleSize, x + playerStep); break;
            }
            updatePlayerPosition();
        });

        // ---------------------- 3. 猎豹追击+逐渐加速逻辑 ----------------------
        function chasePlayer() {
            const dx = x - x0; // 玩家与猎豹X方向差值
            const dy = y - y0; // 玩家与猎豹Y方向差值

            if (Math.abs(dx) > 0 || Math.abs(dy) > 0) {
                // X方向追击
                if (dx > 0) x0 = Math.min(container.clientWidth - roleSize, x0 + cheetahStep);
                else if (dx < 0) x0 = Math.max(0, x0 - cheetahStep);

                // Y方向追击
                if (dy > 0) y0 = Math.min(container.clientHeight - roleSize, y0 + cheetahStep);
                else if (dy < 0) y0 = Math.max(0, y0 - cheetahStep);

                // 更新猎豹位置
                cheetah.style.top = `${y0}px`;
                cheetah.style.left = `${x0}px`;

                // 碰撞检测
                if (Math.abs(x - x0) < roleSize && Math.abs(y - y0) < roleSize) {
                    setTimeout(() => {
                        alert('被猎豹抓住啦！你在112班只能算个萝莉');
                        resetGame();
                    }, 100);
                }
            }
        }

        // 猎豹加速逻辑
        function startSpeedUp() {
            // 初始启动追击
            chaseTimer = setInterval(chasePlayer, chaseInterval);

            // 每隔speedUpTime毫秒加速一次
            setInterval(() => {
                if (chaseInterval > minInterval) {
                    chaseInterval -= intervalDecrease;
                    // 清除旧定时器，用新间隔重启
                    clearInterval(chaseTimer);
                    chaseTimer = setInterval(chasePlayer, chaseInterval);
                }
            }, speedUpTime);
        }

        // ---------------------- 4. 辅助函数 ----------------------
        // 更新玩家位置
        function updatePlayerPosition() {
            player.style.top = `${y}px`;
            player.style.left = `${x}px`;
        }

        // 重置游戏（恢复初始状态和速度）
        function resetGame() {
            x = container.clientWidth * 0.45;
            y = container.clientHeight * 0.45;
            x0 = container.clientWidth * 0.05;
            y0 = container.clientHeight * 0.05;
            chaseInterval = 250; // 恢复初始追击间隔
            cheetahStep = roleSize * 0.2; // 恢复初始步长

            // 重置猎豹定时器
            clearInterval(chaseTimer);
            chaseTimer = setInterval(chasePlayer, chaseInterval);

            // 更新角色位置
            updatePlayerPosition();
            cheetah.style.top = `${y0}px`;
            cheetah.style.left = `${x0}px`;
        }

        // 窗口大小变化时适配（应对横屏切换）
        window.addEventListener('resize', () => {
            const newRoleSize = getRoleSize();
            x = Math.min(x, container.clientWidth - newRoleSize);
            y = Math.min(y, container.clientHeight - newRoleSize);
            x0 = Math.min(x0, container.clientWidth - newRoleSize);
            y0 = Math.min(y0, container.clientHeight - newRoleSize);
            updatePlayerPosition();
        });

        // 启动游戏
        startSpeedUp();
    </script>
</body>
</html>
